name: Deploy to Test Repo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Dev Repo
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Clone Test Repo
        run: |
          git clone https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/Sherikk786/Test_ADAP.git target-repo

      - name: Copy Files
        run: |
          rsync -av --delete \
          --exclude='.git' \
          ./ target-repo/

      - name: Push to Test Repo
        run: |
          cd target-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Deploy from Dev_ADAP" || echo "No changes to commit"
          git push origin main