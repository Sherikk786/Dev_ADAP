name: Deploy to Test Repo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Dev Repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Clean unnecessary files
        run: |
          rm -rf node_modules
          rm -rf .git
          rm -rf cypress/videos
          rm -rf cypress/screenshots
          rm -rf cypress/results
          rm -rf cypress/reports
          rm -rf .github

      - name: Initialize fresh repo
        run: |
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Fresh deploy from Dev_ADAP"

      - name: Push to Test_ADAP
        run: |
          git branch -M main
          git push https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/Sherikk786/Test_ADAP.git main --force

      - name: Restore run-tests workflow in Test_ADAP
        run: |
          git clone https://x-access-token:${{ secrets.TARGET_REPO_TOKEN }}@github.com/Sherikk786/Test_ADAP.git test_repo
          cd test_repo
          mkdir -p .github/workflows
          cat > .github/workflows/run-tests.yml << 'EOF'
          name: Run Cypress Tests & Report

          on:
            workflow_dispatch:
            push:
              branches: [main]

          jobs:
            test:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout Test Repo
                  uses: actions/checkout@v4

                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: 'npm'

                - name: Install Dependencies
                  run: npm install

                - name: Run Cypress Tests
                  run: npm run test:ci
                  continue-on-error: true

                - name: Merge Mochawesome Reports
                  if: always()
                  run: |
                    npx mochawesome-merge "cypress/results/*.json" -o cypress/results/merged.json
                    npx marge cypress/results/merged.json \
                      --reportDir cypress/reports \
                      --inline \
                      --charts \
                      --reportTitle "Cypress Test Report"

                - name: Upload HTML Report
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: cypress-test-report
                    path: cypress/reports/
                    retention-days: 30

                - name: Show Test Summary
                  if: always()
                  run: |
                    echo "## 🧪 Cypress Test Results" >> $GITHUB_STEP_SUMMARY
                    node -e "
                      const fs = require('fs');
                      if (!fs.existsSync('cypress/results/merged.json')) {
                        console.log('| ❌ Error | No test results found |');
                        process.exit(0);
                      }
                      const report = JSON.parse(fs.readFileSync('cypress/results/merged.json', 'utf8'));
                      const stats = report.stats;
                      console.log('| Metric | Value |');
                      console.log('|--------|-------|');
                      console.log('| ✅ Passed | ' + stats.passes + ' |');
                      console.log('| ❌ Failed | ' + stats.failures + ' |');
                      console.log('| ⏭️ Pending | ' + stats.pending + ' |');
                      console.log('| ⏱️ Duration | ' + (stats.duration/1000).toFixed(2) + 's |');
                    " >> $GITHUB_STEP_SUMMARY
          EOF
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .github/workflows/run-tests.yml
          git commit -m "Restore run-tests workflow after deploy"
          git push

      - name: Trigger Test Workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TARGET_REPO_TOKEN }}" \
            https://api.github.com/repos/Sherikk786/Test_ADAP/actions/workflows/run-tests.yml/dispatches \
            -d '{"ref":"main"}'